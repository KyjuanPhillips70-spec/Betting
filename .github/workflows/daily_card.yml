name: +EV Daily Card

on:
  schedule:
    - cron: '0 13 * * *'   # 9:00 AM ET
    - cron: '0 17 * * *'   # 1:00 PM ET
    - cron: '0 22 * * *'   # 6:00 PM ET
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  daily-card:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout bot code
        uses: actions/checkout@v4
        with:
          ref: claude/ev-sports-betting-bot-e1eaf1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python main.py --init-db

      - name: Run daily card (MLB + Soccer)
        run: python main.py --sport all --sims 5000
