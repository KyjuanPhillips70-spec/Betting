name: Deploy Dashboard to GitHub Pages

on:
  schedule:
    - cron: '30 13 * * *'  # 30 min after 9 AM ET card
    - cron: '30 17 * * *'  # 30 min after 1 PM ET card
    - cron: '30 22 * * *'  # 30 min after 6 PM ET card
  workflow_run:
    workflows: ["+EV Daily Card"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download persisted database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: betting-db
          path: .
          if_no_artifact_found: ignore
          workflow: daily_card.yml

      - name: Generate dashboard
        run: |
          mkdir -p site
          python generate_dashboard.py --db betting_bot.db --out site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
