name: Deploy Dashboard to Netlify

on:
  workflow_run:
    workflows: ["+EV Daily Card"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/ev-sports-betting-bot-e1eaf1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download persisted database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: betting-db
          path: .
          if_no_artifact_found: ignore
          workflow: daily_card.yml

      - name: Generate dashboard
        run: |
          mkdir -p site
          python generate_dashboard.py --db betting_bot.db --out site/index.html

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir site --message "Dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
